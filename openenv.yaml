spec_version: 1
name: chip_flooring_env
version: 1.0.0
description: Industrial chip floorplanning environment for training placement agents on legality, connectivity, and wirelength minimization.
author: gopi-nts0117
type: space
runtime: fastapi
app: server.app:app
port: 8000

environment:
  mode: http
  base_url: https://chip_flooring_env.hf.space
  endpoints:
    reset: POST /reset
    step: POST /step
    state: GET /state
    schema: GET /schema
    tasks: GET /tasks
    grader: POST /grader
    health: GET /health

tags:
  - openenv
  - chip-flooring
  - placement
  - physical-design
  - reinforcement-learning

tasks:
  - id: easy_standard_long_horizon
    difficulty: easy
    description: Plan, reveal, and repair a easy standard layout on a 12x12 grid with hidden constraints, delayed reward, and a later repair phase.
    grid_size: 12
    block_count: 5
    max_steps: 24
    score_range: [0.01, 0.99]
    grader: server.graders.grade_long_horizon

  - id: easy_heterogeneous_long_horizon
    difficulty: easy
    description: Plan, reveal, and repair a easy heterogeneous layout on a 12x12 grid with hidden constraints, delayed reward, and a later repair phase.
    grid_size: 12
    block_count: 5
    max_steps: 24
    score_range: [0.01, 0.99]
    grader: server.graders.grade_long_horizon

  - id: easy_fixed_obstacles_long_horizon
    difficulty: easy
    description: Plan, reveal, and repair a easy fixed_obstacles layout on a 12x12 grid with hidden constraints, delayed reward, and a later repair phase.
    grid_size: 12
    block_count: 5
    max_steps: 24
    score_range: [0.01, 0.99]
    grader: server.graders.grade_long_horizon

  - id: medium_standard_long_horizon
    difficulty: medium
    description: Plan, reveal, and repair a medium standard layout on a 18x18 grid with hidden constraints, delayed reward, and a later repair phase.
    grid_size: 18
    block_count: 10
    max_steps: 24
    score_range: [0.01, 0.99]
    grader: server.graders.grade_long_horizon

  - id: medium_heterogeneous_long_horizon
    difficulty: medium
    description: Plan, reveal, and repair a medium heterogeneous layout on a 18x18 grid with hidden constraints, delayed reward, and a later repair phase.
    grid_size: 18
    block_count: 10
    max_steps: 24
    score_range: [0.01, 0.99]
    grader: server.graders.grade_long_horizon

  - id: medium_fixed_obstacles_long_horizon
    difficulty: medium
    description: Plan, reveal, and repair a medium fixed_obstacles layout on a 18x18 grid with hidden constraints, delayed reward, and a later repair phase.
    grid_size: 18
    block_count: 10
    max_steps: 26
    score_range: [0.01, 0.99]
    grader: server.graders.grade_long_horizon

  - id: hard_standard_long_horizon
    difficulty: hard
    description: Plan, reveal, and repair a hard standard layout on a 24x24 grid with hidden constraints, delayed reward, and a later repair phase.
    grid_size: 24
    block_count: 15
    max_steps: 27
    score_range: [0.01, 0.99]
    grader: server.graders.grade_long_horizon

  - id: hard_heterogeneous_long_horizon
    difficulty: hard
    description: Plan, reveal, and repair a hard heterogeneous layout on a 24x24 grid with hidden constraints, delayed reward, and a later repair phase.
    grid_size: 24
    block_count: 15
    max_steps: 29
    score_range: [0.01, 0.99]
    grader: server.graders.grade_long_horizon

  - id: hard_fixed_obstacles_long_horizon
    difficulty: hard
    description: Plan, reveal, and repair a hard fixed_obstacles layout on a 24x24 grid with hidden constraints, delayed reward, and a later repair phase.
    grid_size: 24
    block_count: 15
    max_steps: 33
    score_range: [0.01, 0.99]
    grader: server.graders.grade_long_horizon
