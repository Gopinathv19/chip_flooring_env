spec_version: 1
name: chip_flooring_env
version: 1.0.0
description: Industrial chip floorplanning environment for training placement agents on legality, connectivity, and wirelength minimization.
author: gopi-nts0117
type: space
runtime: fastapi
app: server.app:app
port: 8000

environment:
  mode: http
  base_url: https://chip_flooring_env.hf.space
  endpoints:
    reset: POST /reset
    step: POST /step
    state: GET /state
    schema: GET /schema
    tasks: GET /tasks
    grader: POST /grader
    health: GET /health

tags:
  - openenv
  - chip-flooring
  - placement
  - physical-design
  - reinforcement-learning

tasks:
  - id: easy
    difficulty: easy
    description: Place 5 connected blocks legally on a 12x12 grid while keeping connected blocks close.
    grid_size: 12
    block_count: 5
    max_steps: 5
    score_range: [0.01, 0.99]
    grader: server.graders.grade_easy

  - id: medium
    difficulty: medium
    description: Place 10 connected blocks legally on an 18x18 grid while reducing congestion and HPWL.
    grid_size: 18
    block_count: 10
    max_steps: 10
    score_range: [0.01, 0.99]
    grader: server.graders.grade_medium

  - id: hard
    difficulty: hard
    description: Place 15 connected blocks legally on a 24x24 grid while minimizing wirelength under tighter clustering pressure.
    grid_size: 24
    block_count: 15
    max_steps: 15
    score_range: [0.01, 0.99]
    grader: server.graders.grade_hard

  - id: heterogeneous
    difficulty: heterogeneous
    description: Place mixed block types on a 24x24 grid while prioritizing higher-power macro blocks and reducing wirelength.
    grid_size: 24
    block_count: 12
    max_steps: 12
    score_range: [0.01, 0.99]
    grader: server.graders.grade_heterogeneous

  - id: fixed_obstacles
    difficulty: fixed_obstacles
    description: Place 15 movable blocks on a 24x24 grid while avoiding 3 pre-placed fixed obstacles.
    grid_size: 24
    block_count: 15
    max_steps: 15
    score_range: [0.01, 0.99]
    grader: server.graders.grade_fixed_obstacles
