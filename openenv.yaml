spec_version: 1
name: chip_flooring_env
version: 1.0.0
description: Industrial chip floorplanning environment for training placement agents on legality, connectivity, and wirelength minimization.
author: gopi-nts0117
type: space
runtime: fastapi
app: chip_flooring_env.server.app:app
port: 8000


tags:
  - openenv
  - chip-flooring
  - placement
  - physical-design
  - reinforcement-learning


tasks:
  - id: easy
    description: Place 5 connected blocks legally on a 12x12 grid while keeping connected blocks close.
    grader: chip_flooring_env.server.graders.grade_easy

  - id: medium
    description: Place 10 connected blocks legally on an 18x18 grid while reducing congestion and HPWL.
    grader: chip_flooring_env.server.graders.grade_medium

  - id: hard
    description: Place 15 connected blocks legally on a 24x24 grid while minimizing wirelength under tighter clustering pressure.
    grader: chip_flooring_env.server.graders.grade_hard
 

 
