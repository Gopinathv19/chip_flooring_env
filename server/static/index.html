<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chip Flooring - PCB Designer</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pcb-bg: #002b12;
            --pcb-trace: #00ff66;
            --pcb-pad-outline: #ffcc00;
            --pcb-pad-fill: #ffd700;
            --chip-bg: #111111;
            --chip-text: #cccccc;
            --glow: 0 0 12px var(--pcb-trace);
            --bg-dark: #030805;
            --panel-bg: rgba(0, 20, 10, 0.85);
            --border: #005522;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 50%, #001a0a 0%, #000000 100%),
                linear-gradient(rgba(0, 255, 102, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 102, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            color: #00ff66;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            padding: 15px 30px;
            background: rgba(0, 15, 5, 0.9);
            border-bottom: 2px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 255, 102, 0.15);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        h1 {
            margin: 0;
            font-family: 'Share Tech Mono', monospace;
            font-size: 26px;
            text-shadow: var(--glow);
            letter-spacing: 3px;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 380px;
            background: rgba(0, 15, 5, 0.7);
            border-right: 2px solid var(--border);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
            backdrop-filter: blur(5px);
            box-shadow: 5px 0 20px rgba(0,0,0,0.5);
            z-index: 5;
        }

        .board-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            position: relative;
        }

        canvas {
            background-color: var(--pcb-bg);
            border: 6px solid #001a0a;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0, 255, 102, 0.15), inset 0 0 50px rgba(0,0,0,0.8);
            cursor: crosshair;
            image-rendering: pixelated;
        }

        .panel {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            background: rgba(0, 25, 10, 0.4);
            box-shadow: inset 0 0 15px rgba(0, 255, 102, 0.05);
            position: relative;
        }
        
        .panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--pcb-trace), transparent);
            opacity: 0.5;
        }

        h2 {
            margin-top: 0;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
            color: #fff;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        select, button, input {
            background: rgba(0, 15, 5, 0.8);
            color: #00ff66;
            border: 1px solid var(--border);
            padding: 10px 14px;
            border-radius: 6px;
            font-family: 'Share Tech Mono', monospace;
            width: 100%;
            margin-bottom: 12px;
            transition: all 0.2s;
            box-sizing: border-box;
            font-size: 15px;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--pcb-trace);
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.2);
        }

        button {
            background: linear-gradient(180deg, #004422, #002211);
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            border: 1px solid #00aa44;
            box-shadow: 0 4px 0 #001105;
        }

        button:hover {
            background: linear-gradient(180deg, #005522, #003311);
            box-shadow: 0 2px 0 #001105, 0 0 15px rgba(0, 255, 102, 0.4);
            transform: translateY(2px);
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #001105;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .stat-box {
            background: rgba(0, 10, 5, 0.6);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        .stat-label {
            font-size: 12px;
            color: #00aa44;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-family: 'Share Tech Mono', monospace;
            font-size: 22px;
            margin-top: 8px;
            font-weight: bold;
        }

        .chip-list {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
            max-height: 350px;
            overflow-y: auto;
            padding: 10px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        
        .chip-list::-webkit-scrollbar { width: 6px; }
        .chip-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        .chip-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .chip-item-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .chip-item-wrapper:hover {
            background: rgba(0, 255, 102, 0.05);
            border-color: rgba(0, 255, 102, 0.2);
        }

        .chip-item-wrapper.selected {
            background: rgba(0, 255, 102, 0.1);
            border-color: var(--pcb-trace);
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.2);
        }

        .chip-visual {
            background-color: #1a1a1a;
            border: 1px solid #333;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6);
            border-radius: 2px;
        }

        .chip-visual::before, .chip-visual::after {
            content: '';
            position: absolute;
        }

        /* Top and bottom pins */
        .chip-visual::before {
            top: -4px; bottom: -4px;
            left: 4px; right: 4px;
            background: repeating-linear-gradient(90deg, #b3b3b3 0px, #b3b3b3 2px, transparent 2px, transparent 6px);
            z-index: -1;
        }

        /* Left and right pins */
        .chip-visual::after {
            left: -4px; right: -4px;
            top: 4px; bottom: 4px;
            background: repeating-linear-gradient(0deg, #b3b3b3 0px, #b3b3b3 2px, transparent 2px, transparent 6px);
            z-index: -1;
        }

        .chip-label-text {
            color: #ccc;
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            text-align: center;
            font-weight: bold;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
            z-index: 2;
        }

        .chip-info {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            color: #00ff66;
            text-align: center;
        }

        .good { color: #00ff66; text-shadow: 0 0 8px rgba(0,255,102,0.5); }
        .bad { color: #ff3333; text-shadow: 0 0 8px rgba(255,51,51,0.5); }
        
        .loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Share Tech Mono', monospace;
            font-size: 28px;
            color: #fff;
            text-shadow: var(--glow);
            display: none;
            background: rgba(0,0,0,0.8);
            padding: 20px 40px;
            border: 2px solid var(--pcb-trace);
            border-radius: 8px;
            z-index: 50;
        }
        
        .coordinates {
            display: flex;
            gap: 15px;
        }

        #tooltip {
            position: absolute;
            background: rgba(0, 15, 5, 0.95);
            border: 1px solid var(--pcb-trace);
            padding: 8px 12px;
            font-family: 'Share Tech Mono', monospace;
            color: #fff;
            pointer-events: none;
            display: none;
            z-index: 100;
            border-radius: 4px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            font-size: 14px;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Share Tech Mono', monospace;
        }
        
        .status-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            background: #666;
            box-shadow: 0 0 5px #333;
            transition: all 0.3s;
        }

        .status-dot.online {
            background: #00ff66;
            box-shadow: 0 0 10px #00ff66;
            animation: pulse 2s infinite;
        }

        .status-dot.error {
            background: #ff3333;
            box-shadow: 0 0 10px #ff3333;
        }
        
        @keyframes pulse {
            0% { opacity: 0.5; box-shadow: 0 0 5px #00ff66; }
            50% { opacity: 1; box-shadow: 0 0 15px #00ff66, 0 0 30px #00ff66; }
            100% { opacity: 0.5; box-shadow: 0 0 5px #00ff66; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>[PCB_DESIGN_SYS v2.0]</h1>
        <div class="status-indicator">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusIndicator">CONNECTING...</span>
        </div>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <div class="panel">
                <h2>Initialization</h2>
                <select id="taskSelect">
                    <option value="hard_standard_long_horizon">Loading tasks...</option>
                </select>
                <button id="btnReset" onclick="resetEnvironment()">Initialize Board</button>
            </div>

            <div class="panel">
                <h2>Telemetry</h2>
                <div class="stat-grid">
                    <div class="stat-box">
                        <div class="stat-label">Reward</div>
                        <div class="stat-value" id="valReward">0.000</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Step</div>
                        <div class="stat-value" id="valStep">0</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Phase</div>
                        <div class="stat-value" id="valPhase">WAIT</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">HPWL</div>
                        <div class="stat-value" id="valHpwl">--</div>
                    </div>
                </div>
            </div>

            <div class="panel">
                <h2>Component Placement</h2>
                <div class="coordinates">
                    <input type="number" id="inputX" placeholder="COORD X" min="0">
                    <input type="number" id="inputY" placeholder="COORD Y" min="0">
                </div>
                <button id="btnPlace" onclick="placeChip()">Mount Component</button>
                <div class="stat-label" style="margin-top:15px; border-bottom:1px solid #003311; padding-bottom:5px;">Component Queue</div>
                <div class="chip-list" id="chipQueue">
                    <div class="chip-info">QUEUE EMPTY</div>
                </div>
            </div>
        </div>

        <div class="board-container" id="boardWrapper">
            <div class="loading" id="loader">PROCESSING SIGNAL...</div>
            <canvas id="pcbCanvas" width="800" height="800"></canvas>
            <div id="tooltip"></div>
        </div>
    </div>

    <script>
        let currentState = null;
        let selectedBlockIndex = 0;
        let socket = null;
        
        const canvas = document.getElementById('pcbCanvas');
        const ctx = canvas.getContext('2d');
        const loader = document.getElementById('loader');
        const tooltip = document.getElementById('tooltip');
        const statusDot = document.getElementById('statusDot');
        const statusIndicator = document.getElementById('statusIndicator');
        
        let cellSize = 20;
        let padding = 40;

        // Initialize WebSocket connection
        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            
            socket = new WebSocket(wsUrl);
            
            socket.onopen = () => {
                statusDot.className = 'status-dot online';
                statusIndicator.textContent = 'SYSTEM ONLINE // CONNECTED';
                loadTasks();
            };
            
            socket.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.type === 'observation') {
                    updateUI(msg.data);
                } else if (msg.type === 'error') {
                    alert('Server Error: ' + msg.data.message);
                }
            };
            
            socket.onclose = () => {
                statusDot.className = 'status-dot';
                statusIndicator.textContent = 'SYSTEM OFFLINE // DISCONNECTED';
                // Attempt to reconnect after 3 seconds
                setTimeout(connect, 3000);
            };

            socket.onerror = (error) => {
                statusDot.className = 'status-dot error';
                statusIndicator.textContent = 'CONNECTION ERROR';
                console.error('WebSocket Error:', error);
            };
        }

        connect();

        async function loadTasks() {
            try {
                const res = await fetch('/tasks');
                if (!res.ok) throw new Error('Tasks not available');
                const data = await res.json();
                const select = document.getElementById('taskSelect');
                select.innerHTML = '';
                if(data.tasks && data.tasks.length > 0) {
                    data.tasks.forEach(t => {
                        const opt = document.createElement('option');
                        opt.value = t.id;
                        opt.textContent = t.id.replace(/_/g, ' ').toUpperCase();
                        select.appendChild(opt);
                    });
                }
            } catch(e) {
                console.log("Tasks endpoint failed, using default");
                document.getElementById('taskSelect').innerHTML = '<option value="hard_standard_long_horizon">HARD STANDARD LONG HORIZON</option>';
            }
        }

        function resetEnvironment() {
            if (!socket || socket.readyState !== WebSocket.OPEN) return;
            
            const task = document.getElementById('taskSelect').value;
            socket.send(JSON.stringify({
                type: 'reset',
                data: { task_name: task }
            }));
            
            loader.style.display = 'block';
            setTimeout(() => loader.style.display = 'none', 500);
        }

        function placeChip() {
            if (!socket || socket.readyState !== WebSocket.OPEN) return;
            if (!currentState) return;

            const x = parseInt(document.getElementById('inputX').value);
            const y = parseInt(document.getElementById('inputY').value);
            
            if (isNaN(x) || isNaN(y)) {
                alert('Please specify valid X and Y coordinates');
                return;
            }
            
            socket.send(JSON.stringify({
                type: 'step',
                data: {
                    x: x,
                    y: y,
                    choosen_block_index: selectedBlockIndex
                }
            }));
            
            loader.style.display = 'block';
            setTimeout(() => loader.style.display = 'none', 300);
        }

        function updateUI(data) {
            currentState = data;
            const obs = data.observation || {};
            
            // Update stats
            const reward = data.reward || 0;
            const rewardEl = document.getElementById('valReward');
            rewardEl.textContent = reward.toFixed(4);
            rewardEl.className = 'stat-value ' + (reward >= 0 ? 'good' : 'bad');
            
            document.getElementById('valStep').textContent = obs.phase_step || 0;
            document.getElementById('valPhase').textContent = (obs.phase || 'PLACEMENT').toUpperCase();
            
            let hpwlStr = obs.current_hpwl !== undefined ? obs.current_hpwl.toFixed(2) : '--';
            if (obs.delta_hpwl !== undefined) {
                const sign = obs.delta_hpwl >= 0 ? '+' : '';
                hpwlStr += ` (${sign}${obs.delta_hpwl.toFixed(2)})`;
            }
            document.getElementById('valHpwl').textContent = hpwlStr;

            // Update remaining blocks
            updateChips(obs.remaining_blocks);

            // Draw Board
            drawBoard(obs.canva_space);
        }

        function updateChips(blocks) {
            const container = document.getElementById('chipQueue');
            container.innerHTML = '';
            
            if (!blocks || blocks.length === 0) {
                container.innerHTML = '<div class="chip-info">QUEUE EMPTY</div>';
                selectedBlockIndex = 0;
                return;
            }

            blocks.forEach((b, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'chip-item-wrapper';
                if (i === selectedBlockIndex) wrapper.classList.add('selected');
                
                const w = b.width || 1;
                const h = b.height || 1;
                const name = b.id || '?';
                
                // Visual representation
                const visual = document.createElement('div');
                visual.className = 'chip-visual';
                visual.style.width = (w * 14) + 'px';
                visual.style.height = (h * 14) + 'px';
                visual.style.minWidth = '20px';
                visual.style.minHeight = '20px';
                
                const label = document.createElement('div');
                label.className = 'chip-label-text';
                label.textContent = name;
                visual.appendChild(label);
                
                const info = document.createElement('div');
                info.className = 'chip-info';
                info.innerHTML = `[${i}] ${name}<br>(${w}x${h})`;
                
                wrapper.appendChild(visual);
                wrapper.appendChild(info);

                wrapper.onclick = () => {
                    document.querySelectorAll('.chip-item-wrapper').forEach(el => el.classList.remove('selected'));
                    wrapper.classList.add('selected');
                    selectedBlockIndex = i;
                };
                container.appendChild(wrapper);
            });
            
            if(selectedBlockIndex >= blocks.length) {
                selectedBlockIndex = 0;
                if(container.firstChild) container.firstChild.classList.add('selected');
            }
        }

        let bgCanvas = null;

        function drawProceduralBackground(width, height) {
            if (bgCanvas && bgCanvas.width === width && bgCanvas.height === height) {
                return bgCanvas;
            }
            bgCanvas = document.createElement('canvas');
            bgCanvas.width = width;
            bgCanvas.height = height;
            const bctx = bgCanvas.getContext('2d');

            bctx.fillStyle = '#001a0a';
            bctx.fillRect(0, 0, width, height);

            bctx.fillStyle = 'rgba(0, 255, 102, 0.02)';
            for(let i=0; i<1000; i++) {
                bctx.fillRect(Math.random()*width, Math.random()*height, 2, 2);
            }

            bctx.lineWidth = 1.5;
            bctx.lineCap = 'round';
            bctx.lineJoin = 'round';
            const traceColors = ['rgba(0, 255, 102, 0.15)', 'rgba(0, 255, 102, 0.08)'];

            for(let i=0; i<60; i++) {
                bctx.strokeStyle = traceColors[i % 2];
                bctx.beginPath();
                let tx = Math.random() * width;
                let ty = Math.random() * height;
                bctx.moveTo(tx, ty);
                
                const segments = Math.floor(Math.random() * 4) + 2;
                for(let s=0; s<segments; s++) {
                    const dir = Math.floor(Math.random() * 8);
                    const len = Math.random() * 50 + 20;
                    if(dir===0) tx+=len;
                    else if(dir===1) { tx+=len; ty+=len; }
                    else if(dir===2) ty+=len;
                    else if(dir===3) { tx-=len; ty+=len; }
                    else if(dir===4) tx-=len;
                    else if(dir===5) { tx-=len; ty-=len; }
                    else if(dir===6) ty-=len;
                    else if(dir===7) { tx+=len; ty-=len; }
                    bctx.lineTo(tx, ty);
                }
                bctx.stroke();

                bctx.fillStyle = '#001a0a';
                bctx.strokeStyle = '#ffd700';
                bctx.lineWidth = 1;
                bctx.beginPath();
                bctx.arc(tx, ty, 3, 0, Math.PI*2);
                bctx.fill();
                bctx.stroke();
            }

            bctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
            bctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            bctx.font = '12px "Share Tech Mono"';
            for(let i=0; i<15; i++) {
                let sx = Math.random() * width;
                let sy = Math.random() * height;
                bctx.strokeRect(sx, sy, Math.random()*40+20, Math.random()*40+20);
                bctx.fillText(`C${Math.floor(Math.random()*100)}`, sx+2, sy-4);
            }

            return bgCanvas;
        }

        function drawBoard(grid) {
            if (!grid || !grid.length) {
                ctx.fillStyle = '#001a0a';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#005522';
                ctx.font = '24px "Share Tech Mono"';
                ctx.textAlign = 'center';
                ctx.fillText("NO SIGNAL // INITIALIZE BOARD", canvas.width/2, canvas.height/2);
                return;
            }

            const rows = grid.length;
            const cols = grid[0].length;
            
            const wrapper = document.getElementById('boardWrapper');
            const maxW = wrapper.clientWidth - 60;
            const maxH = wrapper.clientHeight - 60;
            
            cellSize = Math.min(Math.floor((maxW - padding*2) / cols), Math.floor((maxH - padding*2) / rows));
            if (cellSize < 12) cellSize = 12;
            if (cellSize > 45) cellSize = 45;

            canvas.width = padding * 2 + cols * cellSize;
            canvas.height = padding * 2 + rows * cellSize;

            const bg = drawProceduralBackground(canvas.width, canvas.height);
            ctx.drawImage(bg, 0, 0);

            ctx.fillStyle = 'rgba(0, 255, 102, 0.4)';
            for (let r = 0; r <= rows; r++) {
                for (let c = 0; c <= cols; c++) {
                    const x = padding + c * cellSize;
                    const y = padding + r * cellSize;
                    ctx.fillRect(x - 1, y - 1, 2, 2);
                }
            }

            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 2;
            ctx.setLineDash([10, 5]);
            ctx.strokeRect(padding, padding, cols*cellSize, rows*cellSize);
            ctx.setLineDash([]);

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const val = grid[r][c];
                    const x = padding + c * cellSize;
                    // Y axis is inverted: rows-1-r
                    const y = padding + (rows - 1 - r) * cellSize; 
                    
                    if (val === 0) {
                        ctx.fillStyle = 'rgba(0, 255, 102, 0.1)';
                        ctx.beginPath();
                        ctx.arc(x + cellSize/2, y + cellSize/2, 1.5, 0, Math.PI*2);
                        ctx.fill();
                    } else {
                        const hue = (Math.abs(val) * 65) % 360;
                        ctx.fillStyle = '#111';
                        ctx.fillRect(x + 2, y + 2, cellSize - 4, cellSize - 4);
                        
                        ctx.fillStyle = 'rgba(255,255,255,0.8)';
                        ctx.font = `bold ${Math.max(10, cellSize/3)}px "Share Tech Mono"`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(val, x + cellSize/2, y + cellSize/2);
                        
                        ctx.fillStyle = '#e6c200';
                        const pinW = Math.max(1, Math.floor(cellSize/10));
                        const pinH = Math.max(2, Math.floor(cellSize/8));
                        
                        ctx.fillRect(x + 4, y + 1, pinW, pinH);
                        ctx.fillRect(x + cellSize/2 - pinW/2, y + 1, pinW, pinH);
                        ctx.fillRect(x + cellSize - 4 - pinW, y + 1, pinW, pinH);
                        
                        ctx.fillRect(x + 4, y + cellSize - 1 - pinH, pinW, pinH);
                        ctx.fillRect(x + cellSize/2 - pinW/2, y + cellSize - 1 - pinH, pinW, pinH);
                        ctx.fillRect(x + cellSize - 4 - pinW, y + cellSize - 1 - pinH, pinW, pinH);
                        
                        ctx.strokeStyle = `hsl(${hue}, 100%, 60%)`;
                        ctx.lineWidth = 1;
                        ctx.strokeRect(x + 2, y + 2, cellSize - 4, cellSize - 4);
                    }
                }
            }
        }

        canvas.addEventListener('mousemove', (e) => {
            if (!currentState || !currentState.observation || !currentState.observation.canva_space) return;
            
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            const grid = currentState.observation.canva_space;
            const rows = grid.length;
            const cols = grid[0].length;
            
            const c = Math.floor((mouseX - padding) / cellSize);
            const rRaw = Math.floor((mouseY - padding) / cellSize);
            const r = rows - 1 - rRaw;
            
            if (c >= 0 && c < cols && rRaw >= 0 && rRaw < rows) {
                tooltip.style.display = 'block';
                tooltip.style.left = (e.clientX + 15) + 'px';
                tooltip.style.top = (e.clientY + 15) + 'px';
                tooltip.textContent = `PAD: [X:${c}, Y:${r}] | SIGNAL: ${grid[r][c]}`;
                
                drawBoard(grid);
                
                const x = padding + c * cellSize;
                const y = padding + rRaw * cellSize;
                
                ctx.strokeStyle = 'rgba(0, 255, 102, 0.8)';
                ctx.fillStyle = 'rgba(0, 255, 102, 0.2)';
                ctx.lineWidth = 2;
                
                let previewW = 1;
                let previewH = 1;
                if (currentState.observation.remaining_blocks && currentState.observation.remaining_blocks[selectedBlockIndex]) {
                    previewW = currentState.observation.remaining_blocks[selectedBlockIndex].width || 1;
                    previewH = currentState.observation.remaining_blocks[selectedBlockIndex].height || 1;
                }
                
                // Flip preview height calculation for visual correctly
                if (c + previewW <= cols && rRaw - previewH + 1 >= 0) {
                    const pw = previewW * cellSize;
                    const ph = previewH * cellSize;
                    const previewY = padding + (rRaw - previewH + 1) * cellSize;
                    
                    ctx.fillRect(x, previewY, pw, ph);
                    ctx.strokeRect(x, previewY, pw, ph);
                    
                    ctx.beginPath();
                    ctx.moveTo(x + pw/2 - 10, previewY + ph/2);
                    ctx.lineTo(x + pw/2 + 10, previewY + ph/2);
                    ctx.moveTo(x + pw/2, previewY + ph/2 - 10);
                    ctx.lineTo(x + pw/2, previewY + ph/2 + 10);
                    ctx.stroke();
                } else {
                    ctx.strokeStyle = 'rgba(255, 50, 50, 0.8)';
                    ctx.strokeRect(x, y, cellSize, cellSize);
                }
                
            } else {
                tooltip.style.display = 'none';
                drawBoard(grid);
            }
        });

        canvas.addEventListener('click', (e) => {
            if (!currentState || !currentState.observation || !currentState.observation.canva_space) return;
            
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            const grid = currentState.observation.canva_space;
            const rows = grid.length;
            const cols = grid[0].length;
            
            const c = Math.floor((mouseX - padding) / cellSize);
            const rRaw = Math.floor((mouseY - padding) / cellSize);
            const r = rows - 1 - rRaw; // Y-inverted mapping
            
            if (c >= 0 && c < cols && rRaw >= 0 && rRaw < rows) {
                document.getElementById('inputX').value = c;
                document.getElementById('inputY').value = r;
                // Auto-place on click if desired, but here we just update inputs
            }
        });
        
        canvas.addEventListener('mouseleave', () => {
            tooltip.style.display = 'none';
            if (currentState && currentState.observation && currentState.observation.canva_space) {
                drawBoard(currentState.observation.canva_space);
            }
        });

        drawBoard(null);

    </script>
</body>
</html>
